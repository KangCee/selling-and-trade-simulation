<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAM.TYCOON v5.2 | FIXED SIDEBAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #06090f; color: #f1f5f9; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* SIDEBAR LOGIC - แก้ให้เห็นผลจริง */
        #sidebar {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(-100%);
            z-index: 200; /* ดันให้สูงที่สุด */
        }
        #sidebar.active {
            transform: translateX(0);
        }
        #sidebar-overlay {
            display: none;
            z-index: 190;
        }
        #sidebar-overlay.active {
            display: block;
        }

        .nft-card:hover img { transform: scale(1.05); }
        .nft-card img { transition: transform 0.5s ease; }
        input, select { background: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm"></div>

    <div id="auth-screen" class="fixed inset-0 z-[300] bg-[#06090f] flex items-center justify-center p-4">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl border-t-4 border-yellow-500">
            <h1 class="text-5xl font-black text-yellow-400 mb-2 text-center italic tracking-tighter">SCAM.TYCOON</h1>
            <p class="text-gray-500 text-xs mb-8 text-center uppercase tracking-[0.3em]">Institutional NFT Trading</p>
            <div class="space-y-4">
                <input id="auth-user" type="text" placeholder="Username" class="w-full p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500 font-bold">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500">
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="handleAuth('login')" class="bg-yellow-500 text-black font-black py-4 rounded-2xl hover:brightness-110 active:scale-95 transition">LOGIN</button>
                    <button onclick="handleAuth('register')" class="bg-slate-800 text-white font-bold py-4 rounded-2xl hover:bg-slate-700 active:scale-95 transition">SIGN UP</button>
                </div>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="fixed top-0 left-0 w-80 h-full glass border-r border-slate-800 p-8 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-12">
            <h2 class="text-3xl font-black text-yellow-400 italic">MENU</h2>
            <button onclick="toggleSidebar()" class="text-gray-500 hover:text-white p-2">✕</button>
        </div>
        <nav class="space-y-3 flex-1">
            <button onclick="switchView('market')" class="w-full text-left p-5 rounded-2xl hover:bg-white/5 transition flex items-center gap-4 text-lg">📊 ตลาดเทรดสด</button>
            <button onclick="switchView('portfolio')" class="w-full text-left p-5 rounded-2xl hover:bg-white/5 transition flex items-center gap-4 text-lg">🖼️ คอลเลกชัน & อันดับ</button>
            <hr class="border-slate-800 my-6">
            <button onclick="openModal('sale')" class="w-full text-left p-5 rounded-2xl bg-green-600/10 text-green-400 hover:bg-green-600/20 transition font-bold">💰 ลงขายสินค้า</button>
            <button onclick="openModal('auction')" class="w-full text-left p-5 rounded-2xl bg-purple-600/10 text-purple-400 hover:bg-purple-600/20 transition font-bold">🔨 เปิดประมูล</button>
            <button onclick="openModal('stock')" class="w-full text-left p-5 rounded-2xl bg-blue-600/10 text-blue-400 hover:bg-blue-600/20 transition font-black italic">📈 สร้างหุ้นใหม่</button>
        </nav>
        <button onclick="logout()" class="p-5 text-red-500 font-bold hover:bg-red-500/10 rounded-2xl mt-auto transition">LOGOUT</button>
    </aside>

    <div id="main-app" class="hidden">
        <header class="sticky top-0 z-50 glass p-5 border-b border-white/5">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <button onclick="toggleSidebar()" class="p-3 bg-slate-900 rounded-2xl hover:bg-slate-800 transition active:scale-90 border border-white/10 group">
                    <div class="w-6 h-0.5 bg-yellow-500 mb-1.5 transition-all group-hover:w-4"></div>
                    <div class="w-6 h-0.5 bg-yellow-500 mb-1.5"></div>
                    <div class="w-6 h-0.5 bg-yellow-500 transition-all group-hover:w-4"></div>
                </button>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500 uppercase font-black tracking-widest">CASH BALANCE</p>
                        <p id="balance" class="text-2xl mono font-bold text-green-400">0.00</p>
                    </div>
                    <div id="user-avatar" class="w-12 h-12 bg-yellow-500 rounded-2xl flex items-center justify-center text-black font-black shadow-lg text-xl italic">?</div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6 sm:p-10">
            <div id="view-market" class="view-section">
                <h2 class="text-5xl font-black mb-10 italic tracking-tighter uppercase text-white">Market Floor</h2>
                <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>

            <div id="view-portfolio" class="view-section hidden">
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
                    <div class="lg:col-span-3 space-y-10">
                        <h2 class="text-5xl font-black italic text-yellow-400 tracking-tighter uppercase">My Collection</h2>
                        <div id="my-collection-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                    </div>
                    <div class="space-y-8">
                        <h2 class="text-3xl font-black italic text-blue-400 tracking-tighter uppercase">Top Scammers</h2>
                        <div id="leaderboard" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-container" class="fixed inset-0 z-[250] bg-black/95 hidden flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-lg space-y-5 border border-white/10 shadow-2xl">
            <h2 id="modal-title" class="text-3xl font-black italic uppercase">CREATE</h2>
            <div class="space-y-4">
                <input id="item-name" type="text" placeholder="NAME" class="w-full p-5 rounded-2xl outline-none font-bold">
                <input id="item-price" type="number" placeholder="PRICE / MIN BID" class="w-full p-5 rounded-2xl outline-none font-bold">
                <input id="item-image" type="text" placeholder="IMAGE URL (https://...)" class="w-full p-5 rounded-2xl outline-none text-xs">
                <select id="item-duration" class="w-full p-5 rounded-2xl outline-none hidden">
                    <option value="60">1 MINUTE</option>
                    <option value="300">5 MINUTES</option>
                </select>
                <div class="flex gap-4 pt-6">
                    <button onclick="closeModal()" class="flex-1 p-5 rounded-2xl bg-slate-800 font-bold transition">CANCEL</button>
                    <button id="modal-submit" class="flex-1 p-5 rounded-2xl bg-yellow-500 text-black font-black transition">CONFIRM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATABASE ---
        let db = JSON.parse(localStorage.getItem('scam_db_v52')) || { users: {}, items: [] };
        let currentUser = localStorage.getItem('scam_active_user') || null;
        const save = () => localStorage.setItem('scam_db_v52', JSON.stringify(db));

        // --- SIDEBAR TOGGLE (THE FIX) ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // --- AUTH ---
        function handleAuth(type) {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            if(!user || !pass) return alert('กรอกให้ครบสิวะ!');
            if(type === 'register') {
                if(db.users[user]) return alert('ชื่อนี้ซ้ำ!');
                db.users[user] = { password: pass, balance: 1000000, history: [], displayName: user };
                save(); alert('สมัครแล้ว!');
            } else {
                if(db.users[user] && db.users[user].password === pass) {
                    currentUser = user; localStorage.setItem('scam_active_user', user); initApp();
                } else alert('รหัสผิด!');
            }
        }

        function initApp() {
            if(!currentUser) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-avatar').innerText = currentUser[0].toUpperCase();
            renderAll();
            setInterval(renderAll, 1000); // อัปเดตราคาและเวลาประมูลตลอดเวลา
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            toggleSidebar(); // ปิด sidebar หลังเลือกเมนู
            renderAll();
        }

        function openModal(type) {
            document.getElementById('modal-container').classList.remove('hidden');
            document.getElementById('item-duration').classList.toggle('hidden', type !== 'auction');
            document.getElementById('item-image').classList.toggle('hidden', type === 'stock');
            document.getElementById('modal-title').innerText = "CREATE " + type.toUpperCase();
            document.getElementById('modal-submit').onclick = () => createItem(type);
        }
        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }

        function createItem(type) {
            const name = document.getElementById('item-name').value;
            const price = parseInt(document.getElementById('item-price').value);
            const image = document.getElementById('item-image').value || 'https://via.placeholder.com/400x300?text=SCAM+ASSET';
            const dur = parseInt(document.getElementById('item-duration').value);

            if(!name || isNaN(price)) return alert('กรอกข้อมูลให้ครบ!');
            
            db.items.unshift({
                id: "ID-" + Date.now(),
                type, name, price, image,
                owner: currentUser, status: 'open',
                endTime: type === 'auction' ? Date.now() + (dur * 1000) : null,
                highestBidder: null
            });
            save(); closeModal(); renderAll();
        }

        function renderAll() {
            if(!currentUser) return;
            document.getElementById('balance').innerText = db.users[currentUser].balance.toLocaleString();
            
            // Market
            const market = document.getElementById('market-grid');
            market.innerHTML = '';
            db.items.filter(i => i.status === 'open').forEach(item => {
                const card = document.createElement('div');
                card.className = "glass rounded-[2.5rem] overflow-hidden nft-card flex flex-col border border-white/5 animate-fade-in";
                
                let timeStr = "";
                if(item.type === 'auction') {
                    const sec = Math.max(0, Math.floor((item.endTime - Date.now()) / 1000));
                    timeStr = `<div class="absolute top-5 right-5 bg-purple-600 px-4 py-1.5 rounded-full text-[10px] font-black z-10 shadow-lg">⏳ ${sec}S</div>`;
                    if(sec <= 0 && item.status === 'open') processAuctionEnd(item);
                }

                card.innerHTML = `
                    <div class="relative h-60 overflow-hidden bg-slate-800">
                        ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center font-black text-6xl text-white/10 italic">${item.name[0]}</div>`}
                        ${timeStr}
                        <div class="absolute bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-black/80 to-transparent">
                            <span class="text-[9px] font-black uppercase tracking-widest text-yellow-500 bg-black/50 px-2 py-1 rounded">${item.type}</span>
                        </div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="text-xl font-black uppercase italic text-white truncate">${item.name}</h3>
                            <p class="text-gray-500 text-[10px] font-bold mt-1">SELLER: @${item.owner}</p>
                        </div>
                        <div class="mt-6 flex justify-between items-end">
                            <div>
                                <p class="text-[9px] text-gray-500 font-black uppercase">Current Price</p>
                                <p class="text-2xl mono font-bold text-green-400">฿${item.price.toLocaleString()}</p>
                            </div>
                            <button onclick="${item.type === 'auction' ? `bid('${item.id}')` : `buy('${item.id}')`}" class="px-6 py-3 ${item.type === 'auction' ? 'bg-purple-600' : 'bg-green-600'} rounded-xl font-black text-[10px] uppercase shadow-lg hover:brightness-110">
                                ${item.owner === currentUser ? 'YOUR ITEM' : (item.type === 'auction' ? 'PLACE BID' : 'BUY NOW')}
                            </button>
                        </div>
                    </div>`;
                market.appendChild(card);
            });

            // Collection & Leaderboard (ย่อให้สั้นลง)
            const coll = document.getElementById('my-collection-grid');
            coll.innerHTML = db.items.filter(i => i.owner === currentUser && i.status === 'closed').map(i => `
                <div class="glass p-5 rounded-3xl flex items-center gap-5 border border-white/5">
                    <img src="${i.image}" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1">
                        <p class="font-black uppercase text-sm italic">${i.name}</p>
                        <p class="text-xs text-yellow-500 font-bold">฿${i.price.toLocaleString()}</p>
                    </div>
                </div>`).join('');

            const lb = document.getElementById('leaderboard');
            lb.innerHTML = Object.keys(db.users).map(u => ({id:u, ...db.users[u]})).sort((a,b) => b.balance - a.balance).map((u,i) => `
                <div class="p-4 bg-white/5 rounded-2xl flex justify-between items-center border border-white/5">
                    <span class="text-xs font-bold text-gray-400">#${i+1} @${u.id}</span>
                    <span class="text-sm font-black text-green-400">฿${u.balance.toLocaleString()}</span>
                </div>`).join('');
        }

        function bid(id) {
            const it = db.items.find(i => i.id === id);
            if(it.owner === currentUser) return;
            const amount = parseInt(prompt(`ประมูล ${it.name}\nราคาปัจจุบัน: ฿${it.price}\nใส่ราคาที่มึงไหว:`, it.price + 1000));
            if(amount > it.price && db.users[currentUser].balance >= amount) {
                if(it.highestBidder) db.users[it.highestBidder].balance += it.price;
                db.users[currentUser].balance -= amount;
                it.price = amount; it.highestBidder = currentUser;
                save(); renderAll();
            } else alert('เงินไม่พอหรือใส่ราคากากไป!');
        }

        function buy(id) {
            const it = db.items.find(i => i.id === id);
            if(it.owner === currentUser) return;
            if(db.users[currentUser].balance >= it.price) {
                db.users[currentUser].balance -= it.price;
                db.users[it.owner].balance += it.price;
                it.owner = currentUser; it.status = 'closed';
                save(); renderAll();
            }
        }

        function processAuctionEnd(item) {
            item.status = 'closed';
            if(item.highestBidder) {
                db.users[item.owner].balance += item.price;
                item.owner = item.highestBidder;
            }
            save();
        }

        function logout() { localStorage.removeItem('scam_active_user'); location.reload(); }
        window.onload = initApp;
    </script>
</body>
</html>
