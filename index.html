<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCAM.TYCOON v4.2 | IQ OPTION EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #06090f; color: #f1f5f9; overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .trading-bg { background: radial-gradient(circle at center, #1e293b 0%, #06090f 100%); }
        input { background: #0d1117 !important; border: 1px solid #30363d !important; color: white !important; }
        .btn-call { background: #00c805; box-shadow: 0 4px 20px rgba(0, 200, 5, 0.4); }
        .btn-put { background: #ff3b3b; box-shadow: 0 4px 20px rgba(255, 59, 59, 0.4); }
        .line-chart { stroke: #3b82f6; stroke-width: 3; fill: none; filter: drop-shadow(0 0 8px #3b82f6); transition: all 0.3s ease; }
        .sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-sidebar { transform: translateX(-100%); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#06090f] flex items-center justify-center p-4">
        <div class="glass p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl border-t-4 border-yellow-500">
            <h1 class="text-5xl font-black text-yellow-400 mb-2 text-center italic tracking-tighter">SCAM.TYCOON</h1>
            <p class="text-gray-500 text-xs mb-8 text-center uppercase tracking-[0.3em]">Institutional Grade Trading</p>
            <div class="space-y-4">
                <input id="auth-user" type="text" placeholder="Username" class="w-full p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500 transition-all uppercase">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500 transition-all">
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="handleAuth('login')" class="bg-yellow-500 text-black font-black py-4 rounded-2xl hover:brightness-110 active:scale-95 transition">LOGIN</button>
                    <button onclick="handleAuth('register')" class="bg-slate-800 text-white font-bold py-4 rounded-2xl hover:bg-slate-700 active:scale-95 transition">SIGN UP</button>
                </div>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="fixed top-0 left-0 z-[60] w-72 h-full glass sidebar hidden-sidebar border-r border-slate-800 p-6 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold text-yellow-400 italic font-black">DASHBOARD</h2>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white text-xl">✕</button>
        </div>
        <nav class="space-y-3 flex-1">
            <button onclick="switchView('market')" class="w-full text-left p-4 rounded-2xl hover:bg-slate-800 transition flex items-center gap-3">📊 ตลาดสด & หุ้น</button>
            <button onclick="switchView('portfolio')" class="w-full text-left p-4 rounded-2xl hover:bg-slate-800 transition flex items-center gap-3">💼 พอร์ตของกู</button>
            <hr class="border-slate-800 my-4">
            <button onclick="openModal('auction')" class="w-full text-left p-4 rounded-2xl bg-purple-600/10 text-purple-400 hover:bg-purple-600/20 transition italic font-bold">🔨 ลงประมูล (Coming Soon)</button>
            <button onclick="openModal('sale')" class="w-full text-left p-4 rounded-2xl bg-green-600/10 text-green-400 hover:bg-green-600/20 transition italic font-bold">💰 ลงขายตรง</button>
            <button onclick="openModal('stock')" class="w-full text-left p-4 rounded-2xl bg-blue-600/10 text-blue-400 hover:bg-blue-600/20 transition font-black italic">📈 สร้างเหรียญ/หุ้น</button>
        </nav>
        <button onclick="logout()" class="p-4 text-red-500 font-bold hover:bg-red-500/10 rounded-2xl mt-auto">LOGOUT</button>
    </aside>

    <div id="main-app" class="hidden animate-fade-in">
        <header class="sticky top-0 z-50 glass p-4 border-b border-white/5">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <button onclick="toggleSidebar()" class="text-2xl p-2 bg-slate-900 rounded-xl hover:bg-slate-800 transition shadow-lg">☰</button>
                <div class="flex items-center gap-6">
                    <div class="text-right">
                        <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest leading-none mb-1">Available Funds</p>
                        <p id="balance" class="text-2xl mono font-bold text-green-400">0.00</p>
                    </div>
                    <div id="user-avatar" class="w-12 h-12 bg-yellow-500 rounded-2xl flex items-center justify-center text-black font-black shadow-lg shadow-yellow-500/20 text-xl italic">?</div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 sm:p-8">
            <div id="view-market" class="view-section">
                <h2 class="text-4xl font-black mb-8 italic tracking-tighter">TRADING FLOOR</h2>
                <div id="market-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="view-portfolio" class="view-section hidden">
                <h2 class="text-4xl font-black mb-8 italic text-yellow-400 tracking-tighter">MY ASSETS</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="glass p-6 rounded-3xl border border-white/5 shadow-xl">
                        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">📦 รายการสมบัติในมือ</h3>
                        <div id="my-items-list" class="space-y-3"></div>
                    </div>
                    <div class="glass p-6 rounded-3xl border border-white/5 shadow-xl">
                        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">🕒 Timeline กิจกรรม</h3>
                        <div id="my-history" class="space-y-2 max-h-[500px] overflow-y-auto pr-2 custom-scroll"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="trade-modal" class="fixed inset-0 z-[150] bg-black/95 hidden flex items-center justify-center p-0 sm:p-4 animate-fade-in">
        <div class="w-full h-full max-w-6xl sm:h-auto glass rounded-none sm:rounded-[2.5rem] overflow-hidden flex flex-col lg:flex-row shadow-2xl border border-white/10">
            <div class="flex-1 p-6 sm:p-10 trading-bg relative min-h-[300px]">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 id="trade-stock-name" class="text-4xl font-black text-white italic">---</h2>
                        <span class="px-2 py-0.5 bg-blue-500/20 text-blue-400 text-[10px] font-bold rounded uppercase">Real-Time Chart</span>
                    </div>
                    <div class="text-right">
                        <p id="trade-stock-price" class="text-5xl mono font-bold text-white tracking-tighter">0.00</p>
                        <p id="trade-price-change" class="text-sm font-bold mt-1 text-green-400">+0.00%</p>
                    </div>
                </div>
                <div class="relative h-64 w-full mt-10">
                    <svg id="live-chart-svg" viewBox="0 0 1000 300" preserveAspectRatio="none" class="w-full h-full">
                        <defs>
                            <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
                                <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
                            </linearGradient>
                        </defs>
                        <path id="chart-area" d="" fill="url(#chartGradient)" />
                        <path id="chart-path" class="line-chart" d="M 0 150 L 1000 150" />
                    </svg>
                </div>
            </div>
            <div class="w-full lg:w-96 bg-[#0d1117] p-8 border-l border-white/5 flex flex-col">
                <button onclick="closeTrade()" class="self-end text-gray-500 hover:text-white mb-6 text-xl">✕</button>
                <div class="space-y-8 flex-1">
                    <div>
                        <label class="text-xs text-gray-500 uppercase font-black tracking-widest">ลงเงินเดิมพัน</label>
                        <input id="bet-amount" type="number" value="10000" class="w-full p-5 mt-2 rounded-2xl mono text-2xl font-bold border-none outline-none ring-1 ring-white/10 focus:ring-yellow-500 transition shadow-inner">
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        <button onclick="placeTrade('high')" class="btn-call w-full py-8 rounded-2xl text-white font-black text-2xl active:scale-95 transition flex flex-col items-center">
                            <span>CALL (สูงขึ้น)</span>
                            <span class="text-xs font-normal opacity-70">Payout: 185%</span>
                        </button>
                        <button onclick="placeTrade('low')" class="btn-put w-full py-8 rounded-2xl text-white font-black text-2xl active:scale-95 transition flex flex-col items-center">
                            <span>PUT (ต่ำลง)</span>
                            <span class="text-xs font-normal opacity-70">Payout: 185%</span>
                        </button>
                    </div>
                </div>
                <div class="mt-8 p-4 bg-white/5 rounded-xl border border-white/5">
                    <p class="text-[10px] text-gray-400 leading-relaxed italic">การลงทุนมีความเสี่ยง มึงควรคิดให้ดีก่อนกด เพราะระบบนี้ไม่มีใครรับผิดชอบเงินมึงทั้งนั้น (ยกเว้นแอดมินใจดี)</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-container" class="fixed inset-0 z-[150] bg-black/90 hidden flex items-center justify-center p-4 animate-fade-in">
        <div class="glass p-8 rounded-3xl w-full max-w-lg space-y-4 border border-white/10 shadow-2xl">
            <h2 id="modal-title" class="text-3xl font-black italic tracking-tighter">NEW ITEM</h2>
            <div class="space-y-4">
                <input id="item-name" type="text" placeholder="ชื่อสินค้า หรือ ชื่อหุ้น" class="w-full p-4 rounded-xl outline-none">
                <input id="item-price" type="number" placeholder="ราคาเริ่มต้น" class="w-full p-4 rounded-xl outline-none">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 p-4 rounded-xl bg-slate-800 font-bold hover:bg-slate-700 transition">ยกเลิก</button>
                    <button id="modal-submit" class="flex-1 p-4 rounded-xl bg-yellow-500 text-black font-black hover:brightness-110 transition shadow-lg shadow-yellow-500/20">ยืนยันลงตลาด</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CORE DATABASE (แก้ระบบ Sync ข้อมูลใหม่หมด) ---
        let db = JSON.parse(localStorage.getItem('scam_db_v42')) || { users: {}, items: [] };
        let currentUser = localStorage.getItem('scam_active_user') || null;
        let activeStock = null;
        const save = () => localStorage.setItem('scam_db_v42', JSON.stringify(db));

        // --- AUTH SYSTEM (แก้บั๊กตัวพิมพ์เล็ก/ใหญ่ และ Auto Login) ---
        function handleAuth(type) {
            const rawUser = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();

            if (!rawUser || !pass) return alert('กรอกให้ครบสิฟะ!');
            const user = rawUser.toLowerCase(); // กันบั๊ก Case-sensitive

            if (type === 'register') {
                if (db.users[user]) return alert('ชื่อนี้มีคนใช้แล้ว เปลี่ยนซะ!');
                db.users[user] = { 
                    password: pass, 
                    balance: 1000000, 
                    history: ["สมัครสมาชิกนักต้มตุ๋นเรียบร้อย"],
                    displayName: rawUser
                };
                save();
                alert('สมัครสำเร็จ! เข้าสู่ระบบเลยเพื่อน');
            } else {
                const userData = db.users[user];
                if (userData && userData.password === pass) {
                    currentUser = user;
                    localStorage.setItem('scam_active_user', user);
                    initApp();
                } else {
                    alert('ชื่อหรือรหัสผิด! (ลองเช็กดีๆ ตัวเล็กตัวใหญ่มีผล)');
                }
            }
        }

        function initApp() {
            if (!currentUser || !db.users[currentUser]) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-avatar').innerText = db.users[currentUser].displayName[0].toUpperCase();
            renderAll();
            startPriceEngine();
        }

        function logout() {
            localStorage.removeItem('scam_active_user');
            location.reload();
        }

        // --- UI CONTROLS ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden-sidebar'); }
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if(window.innerWidth < 768) toggleSidebar();
            renderAll();
        }

        function openModal(type) {
            const m = document.getElementById('modal-container');
            const s = document.getElementById('modal-submit');
            m.classList.remove('hidden');
            document.getElementById('modal-title').innerText = type === 'stock' ? "📊 เปิดตัวหุ้นใหม่" : "💰 ลงขายสินค้าตรง";
            s.onclick = () => createItem(type);
        }
        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }

        // --- MARKET LOGIC ---
        function createItem(type) {
            const name = document.getElementById('item-name').value;
            const price = parseInt(document.getElementById('item-price').value);
            if (!name || isNaN(price)) return alert('กรอกข้อมูลให้ครบ!');

            db.items.unshift({
                id: "ITEM-" + Date.now(),
                type, name, price, owner: currentUser,
                status: 'open', history: [price], created_at: new Date().toLocaleTimeString()
            });
            save(); closeModal(); renderAll();
        }

        // --- TRADING ENGINE ---
        function startPriceEngine() {
            setInterval(() => {
                db.items.filter(i => i.type === 'stock').forEach(stock => {
                    const volatility = 0.03; // 3%
                    const change = (Math.random() - 0.49) * (stock.price * volatility); // ลำเอียงให้บวกนิดๆ
                    stock.price = Math.max(10, Math.floor(stock.price + change));
                    stock.history.push(stock.price);
                    if(stock.history.length > 50) stock.history.shift();
                });
                if(activeStock) updateChart();
                if(!document.getElementById('view-market').classList.contains('hidden')) renderAll();
                save();
            }, 1000);
        }

        function openTrade(id) {
            activeStock = db.items.find(i => i.id === id);
            document.getElementById('trade-modal').classList.remove('hidden');
            document.getElementById('trade-stock-name').innerText = activeStock.name;
            updateChart();
        }

        function updateChart() {
            const priceEl = document.getElementById('trade-stock-price');
            const changeEl = document.getElementById('trade-price-change');
            
            priceEl.innerText = activeStock.price.toLocaleString(undefined, {minimumFractionDigits: 2});
            const firstPrice = activeStock.history[0];
            const diff = ((activeStock.price - firstPrice) / firstPrice * 100).toFixed(2);
            changeEl.innerText = `${diff >= 0 ? '+' : ''}${diff}%`;
            changeEl.className = diff >= 0 ? "text-green-400 font-bold" : "text-red-400 font-bold";

            const h = 300, w = 1000;
            const maxP = Math.max(...activeStock.history) * 1.05;
            const minP = Math.min(...activeStock.history) * 0.95;
            const range = maxP - minP || 1;

            const pts = activeStock.history.map((p, i) => {
                const x = (i / (activeStock.history.length - 1)) * w;
                const y = h - ((p - minP) / range) * h;
                return `${x},${y}`;
            });

            document.getElementById('chart-path').setAttribute('d', `M ${pts.join(' L ')}`);
            document.getElementById('chart-area').setAttribute('d', `M ${pts.join(' L ')} L ${w},${h} L 0,${h} Z`);
        }

        function placeTrade(dir) {
            const amount = parseInt(document.getElementById('bet-amount').value);
            if(isNaN(amount) || amount < 100) return alert('ขั้นต่ำ ฿100 นะน้อง');
            if(db.users[currentUser].balance < amount) return alert('ตังค์ไม่พอไปเทรด!');

            const entryPrice = activeStock.price;
            db.users[currentUser].balance -= amount;
            renderAll();
            
            alert(`[ORDER PLACED] ${dir.toUpperCase()} ที่ราคา ${entryPrice}... รอ 3 วินาที`);

            setTimeout(() => {
                const exitPrice = activeStock.price;
                const isWin = (dir === 'high' && exitPrice > entryPrice) || (dir === 'low' && exitPrice < entryPrice);

                if(isWin) {
                    const profit = Math.floor(amount * 1.85);
                    db.users[currentUser].balance += profit;
                    db.users[currentUser].history.push(`💰 กำไรเทรด ${activeStock.name}: +฿${profit.toLocaleString()}`);
                    alert(`✅ ชนะ! รับเงิน ฿${profit.toLocaleString()}`);
                } else {
                    db.users[currentUser].history.push(`📉 แพ้เทรด ${activeStock.name}: -฿${amount.toLocaleString()}`);
                    alert(`❌ แพ้! เสียเงิน ฿${amount.toLocaleString()}`);
                }
                save(); renderAll();
            }, 3000);
        }

        function closeTrade() { activeStock = null; document.getElementById('trade-modal').classList.add('hidden'); }

        // --- RENDER ENGINE ---
        function renderAll() {
            if (!currentUser || !db.users[currentUser]) return;
            document.getElementById('balance').innerText = db.users[currentUser].balance.toLocaleString(undefined, {minimumFractionDigits: 2});
            
            const marketGrid = document.getElementById('market-grid');
            marketGrid.innerHTML = '';
            
            db.items.filter(i => i.status === 'open').forEach(item => {
                const card = document.createElement('div');
                card.className = "glass p-6 rounded-[2rem] space-y-4 hover:border-yellow-500/50 transition shadow-lg border border-white/5";
                
                let actionBtn = (item.type === 'stock') ? 
                    `<button onclick="openTrade('${item.id}')" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-sm tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-500/20">TRADE LIVE</button>` : 
                    (item.owner !== currentUser) ? 
                    `<button onclick="buyItem('${item.id}')" class="w-full bg-green-600 py-4 rounded-2xl font-black text-sm tracking-widest hover:bg-green-500 transition shadow-lg shadow-green-500/20">BUY NOW</button>` : 
                    `<div class="text-center p-3 text-xs text-gray-600 bg-white/5 rounded-xl italic border border-white/5">สินค้าของมึงเอง</div>`;

                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="px-3 py-1 bg-slate-800 rounded-lg text-[10px] uppercase font-black tracking-tighter text-yellow-500 border border-white/5">${item.type}</span>
                        <span class="text-[10px] text-gray-500 font-bold italic">@${db.users[item.owner].displayName}</span>
                    </div>
                    <h3 class="text-2xl font-black italic tracking-tight text-white">${item.name}</h3>
                    <div class="flex justify-between items-end">
                        <p class="text-3xl mono font-bold text-green-400 leading-none">฿${item.price.toLocaleString()}</p>
                        <div class="w-1/2">${actionBtn}</div>
                    </div>
                `;
                marketGrid.appendChild(card);
            });

            // Update Portfolio
            const myItemsList = document.getElementById('my-items-list');
            const myOwned = db.items.filter(i => i.owner === currentUser);
            myItemsList.innerHTML = myOwned.length === 0 ? `<p class="text-center text-gray-600 italic">ยังไม่มีสมบัติอะไรเลยเพื่อน...</p>` :
                myOwned.map(i => `
                    <div class="p-4 bg-white/5 rounded-2xl flex justify-between items-center border border-white/5">
                        <div><p class="font-bold text-white">${i.name}</p><p class="text-[10px] text-gray-500 uppercase">${i.type} | ${i.status === 'open' ? 'กำลังตั้งขาย' : 'ในคลัง'}</p></div>
                        <p class="mono text-yellow-500 font-bold">฿${i.price.toLocaleString()}</p>
                    </div>`).join('');

            const myHistory = document.getElementById('my-history');
            myHistory.innerHTML = db.users[currentUser].history.slice().reverse().map(h => `
                <div class="p-3 bg-white/5 rounded-xl text-[11px] border-l-4 border-yellow-500/50 mb-2">${h}</div>`).join('');
        }

        function buyItem(id) {
            const item = db.items.find(i => i.id === id);
            if(db.users[currentUser].balance < item.price) return alert('เงินไม่พอ!');
            
            if(confirm(`ยืนยันการซื้อ ${item.name} ในราคา ฿${item.price.toLocaleString()}?`)) {
                db.users[currentUser].balance -= item.price;
                db.users[item.owner].balance += item.price;
                db.users[item.owner].history.push(`💰 ขายของได้: ${item.name} รับเงิน ฿${item.price.toLocaleString()}`);
                
                item.owner = currentUser;
                item.status = 'closed'; // เปลี่ยนเป็นปิดการขายเพื่อให้ย้ายไปอยู่ใน Portfolio
                
                db.users[currentUser].history.push(`🛍️ ซื้อของสำเร็จ: ${item.name} จ่ายเงิน ฿${item.price.toLocaleString()}`);
                save(); renderAll();
                alert('ซื้อสำเร็จ! ไปเช็กในพอร์ตดู');
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
