<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SCAMMER TYCOON - นักลงทุนกวนส้นตีน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .rigged-graph { transition: all 0.2s ease-in-out; }
        .glitch { animation: glitch 1s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body class="p-4">

    <div id="login-screen" class="max-w-md mx-auto mt-20 bg-slate-800 p-8 rounded-xl border-4 border-yellow-500 shadow-2xl">
        <h1 class="text-3xl font-bold mb-6 text-center text-yellow-400">สมัครไอดีเหอะ... จะได้มาโดนแดก</h1>
        <input id="username" type="text" placeholder="ชื่อเท่ๆ" class="w-full p-3 mb-4 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-yellow-400 text-white">
        <input id="password" type="password" placeholder="รหัสผ่าน (ตั้งมั่วๆ ไป)" class="w-full p-3 mb-6 rounded bg-slate-700 border border-slate-600">
        <button onclick="login()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 rounded-lg transition-all active:scale-95">เข้าสู่ระบบ (ไปโดนเชือด)</button>
    </div>

    <div id="game-screen" class="hidden max-w-6xl mx-auto">
        <div class="flex justify-between items-center bg-slate-800 p-4 rounded-lg mb-6 border-b-4 border-green-500">
            <div>
                <span class="text-gray-400">ยินดีต้อนรับท่านมหาเศรษฐี (ปลอม): </span>
                <span id="display-name" class="font-bold text-yellow-400 text-xl"></span>
            </div>
            <div class="text-2xl font-bold">
                💰 SCAM COIN: <span id="balance" class="text-green-400">1,000,000</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-slate-800 p-6 rounded-xl border-2 border-purple-500 shadow-lg">
                <h2 class="text-2xl font-bold mb-4 text-purple-400 underline italic">ประมูลของแปลก (0-5000 บาท)</h2>
                
                <div class="mb-6 bg-slate-700 p-4 rounded-lg">
                    <p class="text-sm mb-2 text-gray-300">ลงขายอะไรโง่ๆ หน่อย:</p>
                    <input id="item-name" type="text" placeholder="ชื่อของแปลก..." class="w-full p-2 mb-2 bg-slate-800 rounded border border-purple-500">
                    <button onclick="listForSale()" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded text-sm w-full font-bold">ลงขาย (เริ่มต้น $0)</button>
                </div>

                <div id="auction-list" class="space-y-4 max-h-96 overflow-y-auto pr-2">
                    </div>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl border-2 border-red-500 shadow-lg">
                <h2 class="text-2xl font-bold mb-2 text-red-500 flex justify-between">
                    <span>กราฟหุ้นแดกตับ</span>
                    <span id="stock-symbol" class="text-sm bg-red-900 px-2 py-1 rounded">$P0NZI</span>
                </h2>
                <div class="h-48 bg-black rounded-lg mb-4 flex items-end justify-between px-2 overflow-hidden border border-red-900">
                    <div id="graph-bars" class="flex items-end w-full h-full gap-1"></div>
                </div>
                <div class="text-center mb-4">
                    <span class="text-gray-400 italic">ราคาปัจจุบัน:</span>
                    <span id="stock-price" class="text-3xl font-mono font-bold text-white">5,000</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="trade('BUY')" class="bg-green-600 hover:bg-green-500 py-4 rounded-lg font-bold text-xl active:translate-y-1">BUY (ซื้อขึ้น)</button>
                    <button onclick="trade('SELL')" class="bg-red-600 hover:bg-red-500 py-4 rounded-lg font-bold text-xl active:translate-y-1">SELL (ขายลง)</button>
                </div>
                <p id="rigged-message" class="mt-4 text-center text-red-400 font-bold h-6"></p>
            </div>

        </div>
    </div>

    <script>
        let balance = 1000000;
        let stockPrice = 5000;
        let username = "";
        let history = [50, 40, 60, 80, 40, 50, 70, 60, 50, 45];

        // ระบบ Login
        function login() {
            const userInp = document.getElementById('username').value;
            if (!userInp) return alert('ใส่ชื่อหน่อยไอ้น้อง');
            username = userInp;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = username;
            updateBalance(0);
            renderGraph();
        }

        function updateBalance(amount) {
            balance += amount;
            document.getElementById('balance').innerText = balance.toLocaleString();
            document.getElementById('balance').classList.add('glitch');
            setTimeout(() => document.getElementById('balance').classList.remove('glitch'), 500);
        }

        // ระบบประมูล
        function listForSale() {
            const itemName = document.getElementById('item-name').value;
            if (!itemName) return;

            const id = Date.now();
            const div = document.createElement('div');
            div.className = "bg-slate-900 p-4 rounded-lg border-l-4 border-yellow-500 flex justify-between items-center";
            div.id = `item-${id}`;
            div.innerHTML = `
                <div>
                    <h3 class="font-bold text-yellow-500">${itemName}</h3>
                    <p class="text-xs text-gray-400">ราคาล่าสุด: <span id="price-${id}">0</span></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="bid('${id}')" class="bg-blue-600 px-3 py-1 rounded text-xs">คนอื่นมาบิด</button>
                    <button onclick="endAuction('${id}')" class="bg-red-600 px-3 py-1 rounded text-xs font-bold">จบยอดดื้อๆ</button>
                </div>
            `;
            document.getElementById('auction-list').prepend(div);
            document.getElementById('item-name').value = "";
        }

        function bid(id) {
            const priceElem = document.getElementById(`price-${id}`);
            let currentPrice = parseInt(priceElem.innerText);
            let nextBid = currentPrice + Math.floor(Math.random() * 500);
            if (nextBid > 5000) nextBid = 5000;
            priceElem.innerText = nextBid;
        }

        function endAuction(id) {
            const price = parseInt(document.getElementById(`price-${id}`).innerText);
            alert(`มึงกดจบประมูล! ได้เงินโง่ๆ มา: ${price} บาท`);
            updateBalance(price);
            document.getElementById(`item-${id}`).remove();
        }

        // ระบบเทรดหุ้นกวนส้นตีน (The Rigged Engine)
        function renderGraph() {
            const container = document.getElementById('graph-bars');
            container.innerHTML = '';
            history.forEach(h => {
                const bar = document.createElement('div');
                bar.style.height = `${h}%`;
                bar.className = `flex-1 ${h > history[history.indexOf(h)-1] ? 'bg-green-500' : 'bg-red-500'} opacity-60 rounded-t-sm`;
                container.appendChild(bar);
            });
            document.getElementById('stock-price').innerText = stockPrice.toLocaleString();
        }

        function trade(type) {
            const msg = document.getElementById('rigged-message');
            const bet = 50000;
            
            if (balance < bet) return alert('ตังค์ไม่พอไปเล่นตรงโน้นไป');

            // หวยล็อค: ถ้ากด Buy กราฟจะลง ถ้ากด Sell กราฟจะพุ่ง
            if (type === 'BUY') {
                stockPrice = Math.floor(stockPrice * 0.05); // ดิ่งนรกเหลือ 5%
                history.push(5);
                msg.innerText = "ดิ่งจัดๆ สวนหน้ามึงเลยเป็นไงล่ะ!";
                updateBalance(-bet);
            } else {
                stockPrice = stockPrice * 20; // พุ่งทะลุโลก
                history.push(95);
                msg.innerText = "ขายปุ๊บ พุ่งปั๊บ รู้งี้ไม่น่าขายเล้ยยย";
                updateBalance(-bet);
            }

            if (history.length > 20) history.shift();
            renderGraph();
            
            setTimeout(() => { msg.innerText = ""; }, 3000);
        }

        // สุ่มกราฟไปเรื่อยๆ ให้ดูเหมือนจริง
        setInterval(() => {
            let change = (Math.random() - 0.5) * 5;
            let last = history[history.length - 1];
            let next = Math.max(10, Math.min(90, last + change));
            history.push(next);
            if (history.length > 20) history.shift();
            stockPrice += Math.floor((Math.random() - 0.5) * 100);
            if (stockPrice < 10) stockPrice = 10;
            renderGraph();
        }, 2000);

    </script>
</body>
</html>
